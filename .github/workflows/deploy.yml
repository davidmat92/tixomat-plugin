name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete --exclude='.git' --exclude='.github'
          path: ./
          remote_path: /home/runcloud/webapps/demo-mdj-events/wp-content/plugins/tixomat/
          remote_host: 51.195.61.6
          remote_port: 22
          remote_user: runcloud
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
